services:

  api:
    build: .
    container_name: fraud-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    networks:
      - fraud-net
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    container_name: fraud-dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - fraud-net
    command: streamlit run app/dashboard.py --server.address=0.0.0.0 --server.port=8501

networks:
  fraud-net:
    driver: bridge